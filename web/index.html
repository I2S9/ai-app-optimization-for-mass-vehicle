<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>WGHT Dashboard</title>
    <link rel="stylesheet" href="/css/app.css?v=persist2" />
    <link rel="stylesheet" href="/css/bd-grid.css?v=mns14-curblink" />
    <link rel="stylesheet" href="/css/sidebar.css?v=20260520-syn-perf3" />
    <link rel="stylesheet" href="/css/matrix-modal.css?v=matrix16" />
    <script type="importmap">
      {
        "imports": {
          "vue": "/vendor/vue.esm-browser.prod.js",
          "hyperformula": "/js/hyperformula.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <p style="margin: 24px; font-family: Segoe UI, sans-serif; font-size: 14px">
        Loading application…
      </p>
    </div>
    <script>
      window.addEventListener('error', function (e) {
        var msg = (e && e.message) || String(e);
        var file = (e && e.filename) || '';
        var line = (e && e.lineno) || '';
        var col = (e && e.colno) || '';
        var stack = '';
        try {
          stack = e && e.error && e.error.stack ? String(e.error.stack) : '';
        } catch (err) {
          stack = '';
        }
        var el = document.getElementById('app');
        if (el) {
          var where = file
            ? '\n\nSource: ' + file + (line ? ':' + line : '') + (col ? ':' + col : '')
            : '';
          var stackBlock = stack ? '\n\nStack:\n' + stack : '';
          el.innerHTML =
            '<pre style="margin:24px;color:#b00020;font:14px/1.4 Segoe UI,sans-serif;white-space:pre-wrap">' +
            'Startup error:\n' +
            msg +
            where +
            stackBlock +
            '\n\nTry: close Edge, double-click run-bd-server.bat, then Ctrl+F5.</pre>';
        }
      });

      window.addEventListener('unhandledrejection', function (e) {
        var reason = (e && e.reason) || '';
        var msg = '';
        if (reason && reason.message) msg = reason.message;
        else msg = String(reason || e);
        var stack = '';
        try {
          stack = reason && reason.stack ? String(reason.stack) : '';
        } catch (err) {
          stack = '';
        }
        var el = document.getElementById('app');
        if (el) {
          el.innerHTML =
            '<pre style="margin:24px;color:#b00020;font:14px/1.4 Segoe UI,sans-serif;white-space:pre-wrap">' +
            'Startup error (promise):\n' +
            msg +
            (stack ? '\n\nStack:\n' + stack : '') +
            '\n\nTry: close Edge, double-click run-bd-server.bat, then Ctrl+F5.</pre>';
        }
      });
    </script>
    <!-- API Supabase : via proxy sur le meme port que l'app (run-bd-server.ps1) -->
    <!-- Ne pas definir __WGHT_API_BASE__ sauf debug -->
    <script type="module" src="/js/main.js?v=mns16-curbfix"></script>
  </body>
</html>
